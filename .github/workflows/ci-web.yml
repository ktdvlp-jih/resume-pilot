name: CI Web

on:
  push:
    branches: [main]
    paths: ['resume-web/**', 'resume-admin/**', '.github/workflows/ci-web.yml']
  pull_request:
    branches: [main]
    paths: ['resume-web/**', 'resume-admin/**']

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: resume-web/package-lock.json
      - run: npm ci
        working-directory: resume-web
      - run: npm run lint
        working-directory: resume-web
      - run: npm run build
        working-directory: resume-web

  build-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: resume-admin/package-lock.json
      - run: npm ci
        working-directory: resume-admin
      - run: npm run lint
        working-directory: resume-admin
      - run: npm run build
        working-directory: resume-admin
