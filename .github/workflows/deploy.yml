name: Deploy Docker (Ubuntu self-hosted)

# Ubuntu Self-hosted Runner — master push / workflow_dispatch 시 배포
# 1) repo를 master로 동기화 (구 스크립트가 main pull 하는 문제 방지)
# 2) resume-pilot.sh deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-ubuntu
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 45

    steps:
      - name: Sync repo to master
        working-directory: /home/jeon/apps/resume-pilot
        run: |
          git fetch origin master
          # 배포 서버 로컬 수정(수동 편집 등) 무시 — origin/master 와 강제 일치
          git checkout -f -B master origin/master
          chmod +x scripts/resume-pilot.sh
          chmod +x scripts/deploy-smoke.sh
          chmod +x scripts/deploy-smoke-e2e.sh
          chmod +x scripts/deploy-smoke-e2e-ai.sh
          chmod +x scripts/ci-setting-read.sh

      - name: Deploy (git pull + docker compose)
        run: bash /home/jeon/apps/resume-pilot/scripts/resume-pilot.sh deploy

      - name: HTTP + API smoke
        run: bash /home/jeon/apps/resume-pilot/scripts/deploy-smoke.sh

      - name: E2E smoke (Playwright via Docker)
        run: bash /home/jeon/apps/resume-pilot/scripts/deploy-smoke-e2e.sh

      - name: AI E2E TC-AI-05 (Playwright via Docker)
        run: bash /home/jeon/apps/resume-pilot/scripts/deploy-smoke-e2e-ai.sh
