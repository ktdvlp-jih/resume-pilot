prompt-service:
  url: ${PROMPT_SERVICE_URL:http://localhost:8001}

spring:
  application:
    name: resume-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/resumepilot_dev}
    username: ${SPRING_DATASOURCE_USERNAME:resumepilot}
    password: ${SPRING_DATASOURCE_PASSWORD:resumepilot}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:change-me-to-a-secure-random-string-at-least-256-bits-long}
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

ai:
  resume-ai-url: ${RESUME_AI_SERVICE_URL:${RESUME_AI_URL:http://localhost:8000}}
  rag-service-url: ${RAG_SERVICE_URL:http://localhost:8002}

cors:
  allowed-origins: ${RESUME_CORS_ORIGINS:http://localhost:5173,http://localhost:5174}

app:
  spa:
    enabled: false
  internal-api-token: ${INTERNAL_API_TOKEN:}
  llm:
    encryption-key: ${LLM_ENCRYPTION_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.resumepilot_dev: DEBUG
